<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D 地球（ちきゅう）の公転（こうてん）モデル</title>
<style>
  :root {
    --bg-top: #0a1a2f;
    --bg-bottom: #02060f;
    --panel-border: rgba(255,255,255,0.18);
    --text: #eaf2ff;
    --accent: #4ea8ff;
    --slider: #6fc3ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 30%, var(--bg-top), var(--bg-bottom));
    font-family: "BIZ UDPGothic", "BIZ UDGothic", "Hiragino Sans", sans-serif;
    color: var(--text);
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #main-wrap { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* 小窓（両方ビューのときのサブ表示） */
  #inset-wrap {
    position: fixed; top: 12px; right: 12px;
    width: 32vw; max-width: 240px; aspect-ratio: 1 / 1;
    border: 2px solid var(--panel-border); border-radius: 14px;
    overflow: hidden; display: none;
    background: rgba(2,6,15,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #inset-wrap.show { display: block; }
  #inset-wrap canvas { width: 100%; height: 100%; }
  #inset-label {
    position: absolute; left: 8px; bottom: 6px;
    font-size: 12px; opacity: 0.85; pointer-events: none;
    text-shadow: 0 1px 3px #000;
  }

  /* 季節バッジ */
  #season-badge {
    position: fixed; top: 14px; left: 14px;
    font-size: 20px; font-weight: 700;
    padding: 6px 16px; border-radius: 12px;
    background: rgba(2,6,15,0.55); border: 1px solid var(--panel-border);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }

  /* スライダー */
  .slider-zone {
    position: fixed; left: 12px; right: 12px; bottom: 80px;
    background: rgba(2,6,15,0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border-radius: 14px; padding: 10px 16px 14px;
  }
  .slider-marks {
    position: relative; height: 18px; margin: 0 6px 2px;
    font-size: 13px; font-weight: 700;
  }
  .slider-marks span {
    position: absolute; transform: translateX(-50%);
    opacity: 0.85;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 3px;
    background: var(--slider);
    outline: none; margin: 8px 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    cursor: pointer;
  }
  input[type=range]::-moz-range-track {
    height: 4px; border-radius: 3px; background: var(--slider);
  }

  /* 操作パネル */
  .panel {
    position: fixed; bottom: 14px; left: 8px; right: 8px;
    display: flex; gap: 8px; align-items: center; flex-wrap: nowrap;
    justify-content: center;
    background: rgba(2, 6, 15, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 8px 10px; border-radius: 16px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .panel::-webkit-scrollbar { display: none; }
  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.06); color: var(--text);
    font: inherit; font-size: 15px; font-weight: 600;
    padding: 10px 14px; border-radius: 12px; cursor: pointer;
    min-height: 44px; flex: 0 0 auto;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  .btn:active { transform: scale(0.96); }
  .btn.on { outline: 2px solid var(--accent); outline-offset: 1px; }

  .hint {
    position: fixed; top: 56px; left: 0; right: 0; text-align: center;
    font-size: 13px; opacity: 0.7; pointer-events: none; transition: opacity 0.6s;
  }
  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; opacity: 0.8; z-index: 5; transition: opacity 0.4s;
  }
  .loading.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="main-wrap"></div>
<div id="inset-wrap"><div id="inset-label"></div></div>

<div id="season-badge">春</div>
<div class="hint" id="hint">ドラッグで まわせます。ピンチ／ホイールで 大きさを かえられます。</div>
<div class="loading" id="loading">読み込み中…</div>

<div class="slider-zone">
  <div class="slider-marks" id="sliderMarks"></div>
  <input type="range" id="orbitSlider" min="0" max="1000" value="0">
</div>

<div class="panel">
  <button class="btn" id="viewBtn">公転ビュー</button>
  <button class="btn" id="resetBtn">視点リセット</button>
  <button class="btn on" id="playBtn">公転</button>
  <button class="btn on" id="rotateBtn">自転</button>
  <button class="btn" id="axisBtn">地軸</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  // ============================================================
  //  定数・設定
  // ============================================================
  const AXIS_TILT = 23.4 * Math.PI / 180;     // 地軸の傾き
  const EARTH_TEX = 'https://sorafjah.github.io/earth-orbit/earth1024.jpg';
  const SUN_TEX   = 'https://sorafjah.github.io/earth-orbit/sun1024.jpg';

  const ORBIT_RADIUS = 9;      // 公転半径
  const SUN_RADIUS    = 2.2;   // 太陽の大きさ
  const EARTH_RADIUS  = 1.0;   // 公転ビューでの地球の大きさ

  // 地軸はワールド空間で右上(+X方向)に固定して傾ける。
  // → 公転で地球が動いても北極は常に同じ向き（手描き図のとおり）。
  // 傾き方向ベクトル（XY平面内、+Xへ23.4°）
  const TILT_DIR = new THREE.Vector3(Math.sin(AXIS_TILT), Math.cos(AXIS_TILT), 0);

  // 公転角 theta（ラジアン, 0..2π）での地球位置。
  //   俯瞰は北(+Y)から見下ろす。地球はXZ平面上を回る。
  //   季節の定義（地軸が+X方向に傾いている前提）：
  //     地球が太陽から見て +X 側にいるとき＝北極が太陽の反対 → 冬
  //     地球が -X 側 → 夏
  //   手描き図に合わせ、春を開始(theta=0)＝地球は +Z 側に置く。
  //     +Z（手前/上）=春, -X（左）=夏, -Z=秋, +X（右）=冬
  function earthPos(theta) {
    // theta=0 で +Z、反時計回り（上から見て）に春→夏→秋→冬
    const x = -Math.sin(theta) * ORBIT_RADIUS;
    const z =  Math.cos(theta) * ORBIT_RADIUS;
    return new THREE.Vector3(x, 0, z);
  }

  // 季節判定（地球の公転位置→季節名）
  // 地軸は +X に傾く。地球位置の x が負（-X側＝夏）／正（+X側＝冬）
  function seasonOf(theta) {
    const x = -Math.sin(theta);
    const z =  Math.cos(theta);
    // 北半球基準：-X側で夏、+X側で冬、その間が春・秋
    if (z > 0.5)  return '春';
    if (x < -0.5) return '夏';
    if (z < -0.5) return '秋';
    if (x > 0.5)  return '冬';
    // 境界の保険
    return z >= 0 ? (x < 0 ? '春' : '春') : (x < 0 ? '秋' : '秋');
  }

  // スライダー上の春夏秋冬の位置（0..1）。theta=0→春。
  //   1周(theta:0→2π) を 0→1 にマップ。
  //   春 theta=0 → 0
  //   夏 theta=π/2 → 0.25
  //   秋 theta=π → 0.5
  //   冬 theta=3π/2 → 0.75
  const SEASON_MARKS = [
    { label: '春', pos: 0.00 },
    { label: '夏', pos: 0.25 },
    { label: '秋', pos: 0.50 },
    { label: '冬', pos: 0.75 },
    { label: '春', pos: 1.00 }
  ];

  // ============================================================
  //  共通シーン要素
  // ============================================================
  const mainWrap  = document.getElementById('main-wrap');
  const insetWrap = document.getElementById('inset-wrap');
  const loading   = document.getElementById('loading');

  const scene = new THREE.Scene();

  // 星空
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1400, sp = new Float32Array(starCount*3);
  for (let i = 0; i < starCount; i++) {
    const r = 80 + Math.random()*60;
    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    sp[i*3]   = r*Math.sin(p)*Math.cos(t);
    sp[i*3+1] = r*Math.sin(p)*Math.sin(t);
    sp[i*3+2] = r*Math.cos(p);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(sp,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xffffff, size:0.4, sizeAttenuation:true })));

  const ambient = new THREE.AmbientLight(0xffffff, 0.32);
  scene.add(ambient);

  // 太陽（中心・自ら光る）
  const sunGroup = new THREE.Group();
  scene.add(sunGroup);
  const sunGeo = new THREE.SphereGeometry(SUN_RADIUS, 48, 48);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa33 });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sunMesh);
  // 太陽からの光（地球を照らす点光源）
  const sunLight = new THREE.PointLight(0xffffff, 2.0, 0, 0);
  sunGroup.add(sunLight);

  // 公転軌道のリング（俯瞰の目印）
  const orbitGeo = new THREE.TorusGeometry(ORBIT_RADIUS, 0.025, 8, 120);
  const orbitMat = new THREE.MeshBasicMaterial({ color: 0x3a6ea5, transparent:true, opacity:0.5 });
  const orbitRing = new THREE.Mesh(orbitGeo, orbitMat);
  orbitRing.rotation.x = Math.PI/2; // XZ平面に寝かせる
  orbitRing.visible = false;
  scene.add(orbitRing);

  // 地球グループ（位置=公転、傾き=固定、自転=内側）
  const earthOrbitPivot = new THREE.Group();  // 位置決め
  scene.add(earthOrbitPivot);
  const earthTilt = new THREE.Group();        // 地軸の傾き（固定方向）
  earthOrbitPivot.add(earthTilt);
  const earthSpin = new THREE.Group();        // 自転
  earthTilt.add(earthSpin);

  // 地軸の傾きを「ワールドで+X側へ23.4°」に固定する。
  // earthTilt をクォータニオンで TILT_DIR 方向へ向ける。
  (function fixTilt() {
    const up = new THREE.Vector3(0,1,0);
    const q = new THREE.Quaternion().setFromUnitVectors(up, TILT_DIR.clone().normalize());
    earthTilt.quaternion.copy(q);
  })();

  const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    color: 0x335577, shininess: 12, specular: new THREE.Color(0x223344)
  });
  const earthMesh = new THREE.Mesh(earthGeo, earthMat);
  earthSpin.add(earthMesh);

  // 地軸ライン＆赤道（地球と一緒に動く）
  const axisGeo = new THREE.CylinderGeometry(0.02, 0.02, EARTH_RADIUS*2.8, 8);
  const axisMat = new THREE.MeshBasicMaterial({ color: 0xffdd33 });
  const axisLine = new THREE.Mesh(axisGeo, axisMat);
  axisLine.visible = false;
  earthSpin.add(axisLine);

  const eqGeo = new THREE.TorusGeometry(EARTH_RADIUS*1.02, 0.012, 8, 64);
  const eqMat = new THREE.MeshBasicMaterial({ color: 0xdd4444, transparent:true, opacity:0.5 });
  const eqRing = new THREE.Mesh(eqGeo, eqMat);
  eqRing.rotation.x = Math.PI/2;
  eqRing.visible = false;
  earthSpin.add(eqRing);

  // テクスチャ読み込み
  const loader = new THREE.TextureLoader();
  loader.crossOrigin = 'anonymous';
  let texLoaded = 0;
  function checkLoaded() { if (++texLoaded >= 2) loading.classList.add('hide'); }
  loader.load(EARTH_TEX, (tex) => {
    tex.anisotropy = 4; earthMat.map = tex; earthMat.color.set(0xffffff); earthMat.needsUpdate = true; checkLoaded();
  }, undefined, () => { loading.textContent = '画像の読み込みに失敗しました'; });
  loader.load(SUN_TEX, (tex) => {
    tex.anisotropy = 4; sunMat.map = tex; sunMat.color.set(0xffffff); sunMat.needsUpdate = true; checkLoaded();
  }, undefined, () => {});

  // ============================================================
  //  カメラ（2つ）＋レンダラー（2つ）
  // ============================================================
  // メインレンダラー
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  mainWrap.appendChild(renderer.domElement);

  // 小窓レンダラー
  const insetRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  insetRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  insetWrap.appendChild(insetRenderer.domElement);

  // 公転俯瞰カメラ（北＝+Yから見下ろす）
  const orbitCam = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
  // 地球アップカメラ（地球の近くから）
  const earthCam = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
  // 小窓用の地球カメラ（アスペクト比が違うので別に持つ）
  const insetCam = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);

  // --- 公転俯瞰カメラのリグ（ドラッグで視点回転） ---
  // 北から見下ろす視点を基準に、ユーザーのドラッグで回せる。
  const orbitRig = new THREE.Group();
  scene.add(orbitRig);
  let orbitDist = 30;
  // 俯瞰の初期：ほぼ真上(北)から見下ろす。少しだけ傾けて立体感。
  let orbitYaw = 0, orbitPitch = -Math.PI/2 + 0.18; // pitch≈-72°（ほぼ真上）

  // --- 地球アップカメラのリグ ---
  const earthRig = new THREE.Group();
  scene.add(earthRig);
  let earthDist = 4;
  let earthYaw = 0, earthPitch = 0;

  // ============================================================
  //  状態
  // ============================================================
  const VIEWS = ['orbit', 'earth', 'both'];   // 公転メイン / 地球メイン / 両方
  const VIEW_LABEL = { orbit:'公転ビュー', earth:'地球ビュー', both:'両方ビュー' };
  let viewIndex = 0;
  let currentView = VIEWS[viewIndex];

  let theta = 0;            // 公転角
  let playing = true;       // 公転アニメ
  let autoSpin = true;      // 自転
  let earthSpinAngle = 0;

  const slider = document.getElementById('orbitSlider');
  const SLIDER_MAX = 1000;

  // ============================================================
  //  スライダーのマーク配置
  // ============================================================
  (function buildMarks() {
    const marks = document.getElementById('sliderMarks');
    SEASON_MARKS.forEach(m => {
      const s = document.createElement('span');
      s.textContent = m.label;
      s.style.left = (m.pos * 100) + '%';
      marks.appendChild(s);
    });
  })();

  // ============================================================
  //  ドラッグ操作（メインビュー対象）
  // ============================================================
  let dragging = false, lastX = 0, lastY = 0, pinch = 0;

  function activeCamState() {
    // 現在メインに表示しているのがどちらのカメラかで操作対象を変える
    return (currentView === 'earth') ? 'earth' : 'orbit';
  }

  function onDown(x, y) { dragging = true; lastX = x; lastY = y; }
  function onMove(x, y) {
    if (!dragging) return;
    const dx = x - lastX, dy = y - lastY;
    // ドラッグした向きに天体(模型)が動くよう、視点の回転を逆向きにする。
    if (activeCamState() === 'orbit') {
      orbitYaw   -= dx * 0.006;
      orbitPitch -= dy * 0.006;
      orbitPitch = Math.max(-Math.PI/2 + 0.02, Math.min(-0.05, orbitPitch));
    } else {
      earthYaw   -= dx * 0.006;
      earthPitch -= dy * 0.006;
      earthPitch = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, earthPitch));
    }
    lastX = x; lastY = y;
  }
  function onUp() { dragging = false; pinch = 0; }

  function zoom(delta) {
    if (activeCamState() === 'orbit') {
      orbitDist = Math.max(12, Math.min(60, orbitDist + delta));
    } else {
      earthDist = Math.max(2.4, Math.min(10, earthDist + delta));
    }
  }

  const md = renderer.domElement;
  md.addEventListener('mousedown', e => onDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onUp);
  md.addEventListener('wheel', e => { e.preventDefault(); zoom(e.deltaY * 0.01); }, { passive:false });

  md.addEventListener('touchstart', e => {
    if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinch = Math.hypot(dx, dy);
    }
  }, { passive:false });
  md.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) onMove(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      if (pinch) zoom(-(d - pinch) * 0.04);
      pinch = d;
    }
  }, { passive:false });
  md.addEventListener('touchend', e => { if (e.touches.length === 0) onUp(); });

  // ============================================================
  //  ボタン
  // ============================================================
  const viewBtn   = document.getElementById('viewBtn');
  const playBtn   = document.getElementById('playBtn');
  const axisBtn   = document.getElementById('axisBtn');
  const rotateBtn = document.getElementById('rotateBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const badge     = document.getElementById('season-badge');
  const insetLabel= document.getElementById('inset-label');
  const hint      = document.getElementById('hint');

  function applyView() {
    currentView = VIEWS[viewIndex];
    viewBtn.textContent = VIEW_LABEL[currentView];
    insetWrap.classList.toggle('show', currentView === 'both');
    if (currentView === 'both') {
      insetLabel.textContent = '地球';
    }
    resize();
  }

  function cycleView(dir) {
    viewIndex = (viewIndex + dir + VIEWS.length) % VIEWS.length;
    applyView();
  }

  viewBtn.addEventListener('click', () => cycleView(1));

  // キーボード：1で戻る、3で進む（巡回）
  window.addEventListener('keydown', e => {
    if (e.key === '1') cycleView(-1);
    else if (e.key === '3') cycleView(1);
  });

  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.classList.toggle('on', playing);
  });

  axisBtn.addEventListener('click', () => {
    const v = !axisLine.visible;
    axisLine.visible = v; eqRing.visible = v; orbitRing.visible = v;
    axisBtn.classList.toggle('on', v);
  });

  rotateBtn.addEventListener('click', () => {
    autoSpin = !autoSpin;
    rotateBtn.classList.toggle('on', autoSpin);
  });

  resetBtn.addEventListener('click', () => {
    if (activeCamState() === 'orbit') {
      orbitYaw = 0; orbitPitch = -Math.PI/2 + 0.18; orbitDist = 30;
    } else {
      earthYaw = 0; earthPitch = 0; earthDist = 4;
    }
  });

  // スライダー → 公転角
  slider.addEventListener('input', () => {
    playing = false;
    playBtn.classList.remove('on');
    theta = (parseFloat(slider.value) / SLIDER_MAX) * Math.PI * 2;
  });

  setTimeout(() => { hint.style.opacity = '0'; }, 5000);

  // ============================================================
  //  カメラ位置の更新
  // ============================================================
  const sphericalToVec = (dist, yaw, pitch) => {
    // pitch: -π/2(真下→上から見下ろす)〜
    const x = dist * Math.cos(pitch) * Math.sin(yaw);
    const y = dist * Math.sin(-pitch);   // pitch=-π/2 で y=+dist（真上）
    const z = dist * Math.cos(pitch) * Math.cos(yaw);
    return new THREE.Vector3(x, y, z);
  };

  function updateOrbitCam() {
    const off = sphericalToVec(orbitDist, orbitYaw, orbitPitch);
    // 注視点を少し手前(+Z)にずらすと、軌道全体が画面の上寄りに映り
    // 下のスライダー／パネルと重ならない。
    const target = new THREE.Vector3(0, 0, ORBIT_RADIUS * 0.28);
    orbitCam.position.copy(off).add(target);
    orbitCam.lookAt(target);
  }

  function updateEarthCam(earthWorldPos) {
    const off = sphericalToVec(earthDist, earthYaw, earthPitch);
    earthCam.position.copy(earthWorldPos).add(off);
    earthCam.lookAt(earthWorldPos);
  }

  // ============================================================
  //  リサイズ
  // ============================================================
  function resize() {
    const w = innerWidth, h = innerHeight;
    renderer.setSize(w, h);
    orbitCam.aspect = w / h; orbitCam.updateProjectionMatrix();
    earthCam.aspect = w / h; earthCam.updateProjectionMatrix();

    if (currentView === 'both') {
      const r = insetWrap.getBoundingClientRect();
      insetRenderer.setSize(r.width, r.height);
      insetCam.aspect = r.width / r.height;
      insetCam.updateProjectionMatrix();
    }
  }
  window.addEventListener('resize', resize);

  // ============================================================
  //  メインループ
  // ============================================================
  let lastSeason = '';
  function animate() {
    requestAnimationFrame(animate);

    // 公転の進行（自動・一方向ループ：冬→春に戻る）
    if (playing) {
      theta += 0.0045;
      if (theta >= Math.PI*2) theta -= Math.PI*2;
      slider.value = (theta / (Math.PI*2)) * SLIDER_MAX;
    }

    // 地球の公転位置
    const pos = earthPos(theta);
    earthOrbitPivot.position.copy(pos);

    // 自転
    if (autoSpin) earthSpinAngle += 0.01;
    earthSpin.rotation.y = earthSpinAngle;

    // 季節バッジ
    const s = seasonOf(theta);
    if (s !== lastSeason) { badge.textContent = s; lastSeason = s; }

    // 太陽の自転（ゆっくり）
    sunMesh.rotation.y += 0.0008;

    // カメラ更新
    updateOrbitCam();
    const earthWorld = new THREE.Vector3();
    earthMesh.getWorldPosition(earthWorld);
    updateEarthCam(earthWorld);

    // メイン描画
    if (currentView === 'earth') {
      renderer.render(scene, earthCam);
    } else {
      renderer.render(scene, orbitCam);
    }

    // 小窓描画（両方ビューのみ）：小窓は地球アップ（専用カメラ）
    if (currentView === 'both') {
      insetCam.position.copy(earthCam.position);
      insetCam.quaternion.copy(earthCam.quaternion);
      insetRenderer.render(scene, insetCam);
    }
  }

  // 初期化
  applyView();
  resize();
  animate();
})();
</script>
</body>
