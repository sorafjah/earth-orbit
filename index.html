<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D 地球（ちきゅう）と 公転（こうてん）</title>
<style>
  :root {
    --bg-top: #0a1a2f;
    --bg-bottom: #02060f;
    --panel: rgba(255,255,255,0.08);
    --panel-border: rgba(255,255,255,0.18);
    --text: #eaf2ff;
    --accent: #4ea8ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 30%, var(--bg-top), var(--bg-bottom));
    font-family: "BIZ UDPGothic", "BIZ UDGothic", "Hiragino Sans", sans-serif;
    color: var(--text);
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  /* 地球アップ用の小窓 */
  #inset {
    position: fixed; right: 10px; top: 56px;
    width: 38vw; max-width: 240px; aspect-ratio: 1 / 1;
    border: 2px solid var(--panel-border); border-radius: 14px;
    overflow: hidden; background: rgba(2,6,15,0.6);
    display: none; z-index: 3;
  }
  #inset canvas { width: 100%; height: 100%; }
  #inset .label {
    position: absolute; top: 4px; left: 8px; font-size: 12px; opacity: 0.8;
    pointer-events: none;
  }

  /* スライダー帯 */
  .slider-bar {
    position: fixed; left: 8px; right: 8px; bottom: 72px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(2, 6, 15, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 16px 14px 8px; border-radius: 14px; z-index: 4;
  }
  .slider-bar .season-label {
    flex: 0 0 auto; font-size: 16px; font-weight: 700; min-width: 2.4em; text-align: center;
  }
  #orbitSlider {
    flex: 1 1 auto; height: 38px; margin: 0;
    -webkit-appearance: none; appearance: none; background: transparent;
  }
  #orbitSlider:focus { outline: none; }
  .slider-wrap { position: relative; flex: 1 1 auto; }
  .slider-ticks {
    position: absolute; left: 0; right: 0; top: -14px; height: 14px;
    pointer-events: none;
  }
  .slider-ticks span {
    position: absolute; transform: translateX(-50%);
    font-size: 13px; font-weight: 700; opacity: 0.85;
  }
  #orbitSlider::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px; background: #4ea8ff;
  }
  #orbitSlider::-moz-range-track {
    height: 6px; border-radius: 3px; background: #4ea8ff;
  }
  #orbitSlider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    margin-top: -10px; cursor: pointer;
  }
  #orbitSlider::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent); cursor: pointer;
  }

  .panel {
    position: fixed; bottom: 16px; left: 8px; right: 8px;
    display: flex; gap: 8px; align-items: center; flex-wrap: nowrap;
    justify-content: center;
    background: rgba(2, 6, 15, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 8px 10px; border-radius: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    z-index: 4;
  }
  .panel::-webkit-scrollbar { display: none; }
  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.06); color: var(--text);
    font: inherit; font-size: 15px; font-weight: 600;
    padding: 10px 14px; border-radius: 12px; cursor: pointer;
    min-height: 44px; flex: 0 0 auto; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  .btn:active { transform: scale(0.96); }
  .btn.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  #viewBtn { font-weight: 700; }

  .hint {
    position: fixed; top: 12px; left: 0; right: 0; text-align: center;
    font-size: 13px; opacity: 0.7; pointer-events: none;
    transition: opacity 0.6s;
  }

  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; opacity: 0.8; z-index: 5; transition: opacity 0.4s;
  }
  .loading.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="inset"><div class="label">地球（ちきゅう）</div></div>

<div class="hint" id="hint">ドラッグで まわせます。ピンチ／ホイールで 大きさを かえられます。</div>
<div class="loading" id="loading">読み込み中…</div>

<div class="slider-bar">
  <div class="slider-wrap">
    <div class="slider-ticks">
      <span style="left:0%">冬</span>
      <span style="left:25%">春</span>
      <span style="left:50%">夏</span>
      <span style="left:75%">秋</span>
      <span style="left:100%">冬</span>
    </div>
    <input type="range" id="orbitSlider" min="0" max="1000" value="0" step="1">
  </div>
</div>

<div class="panel">
  <button class="btn" id="viewBtn">地球メイン</button>
  <button class="btn on" id="rotateBtn">自転</button>
  <button class="btn on" id="revolveBtn">公転</button>
  <button class="btn" id="resetBtn">正面</button>
  <button class="btn" id="axisBtn">地軸</button>
  <button class="btn" id="equatorBtn">赤道</button>
  <button class="btn" id="orbitLineBtn">公転の道</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const wrap = document.getElementById('canvas-wrap');
  const loading = document.getElementById('loading');
  const insetEl = document.getElementById('inset');

  // ===== テクスチャURL（差し替えはここだけ） =====
  const EARTH_TEXTURE_URL = 'earth1024.jpg';
  const SUN_TEXTURE_URL   = 'sun1024.jpg';

  const AXIS_TILT = 23.4 * Math.PI / 180; // 地軸の傾き

  // ===== 共通シーン =====
  const scene = new THREE.Scene();

  // ----- 星空 -----
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1400, spos = new Float32Array(starCount*3);
  for (let i = 0; i < starCount; i++) {
    const r = 120 + Math.random()*120;
    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    spos[i*3]   = r*Math.sin(p)*Math.cos(t);
    spos[i*3+1] = r*Math.sin(p)*Math.sin(t);
    spos[i*3+2] = r*Math.cos(p);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(spos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xffffff, size:0.5, sizeAttenuation:true })));

  // ===== 太陽（原点） =====
  const ORBIT_RADIUS = 9;       // 公転半径
  const SUN_RADIUS = 2.2;
  const EARTH_RADIUS = 1.0;

  const sunGroup = new THREE.Group();
  scene.add(sunGroup);
  const sunGeo = new THREE.SphereGeometry(SUN_RADIUS, 48, 48);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa33 });
  const sunMesh = new THREE.Mesh(sunGeo, sunMat);
  sunGroup.add(sunMesh);

  // 太陽からの光（地球を照らす）。地球の位置を常に向くようにする。
  const sunLight = new THREE.PointLight(0xffffff, 1.6, 0, 0.0);
  sunGroup.add(sunLight);
  const ambient = new THREE.AmbientLight(0xffffff, 0.18);
  scene.add(ambient);

  // ===== 公転の道（リング） =====
  const orbitRing = new THREE.Mesh(
    new THREE.TorusGeometry(ORBIT_RADIUS, 0.02, 8, 160),
    new THREE.MeshBasicMaterial({ color: 0x4ea8ff, transparent: true, opacity: 0.35 })
  );
  orbitRing.rotation.x = Math.PI / 2; // 水平面（XZ）に寝かせる
  orbitRing.visible = false;
  scene.add(orbitRing);

  // ===== 地球 =====
  // 公転位置を持つ earthOrbit(原点中心の回転) → earthPos(半径ぶん移動)
  //   → earthTilt(地軸の傾き・公転中も向きは一定) → earthSpin(自転)
  const earthOrbit = new THREE.Group();   // Y軸まわりに回すと公転
  scene.add(earthOrbit);
  const earthPos = new THREE.Group();
  earthPos.position.set(ORBIT_RADIUS, 0, 0);
  earthOrbit.add(earthPos);

  const earthTilt = new THREE.Group();
  earthPos.add(earthTilt);
  // 地軸の傾きは「公転面に対して一定の向き」を保つ。
  // ワールドの +X 方向へ倒す形で固定（earthOrbit が回ると earthPos 内で
  // 相対的に向きが変わってしまうため、毎フレーム earthOrbit の回転を打ち消す）。
  const earthSpin = new THREE.Group();
  earthTilt.add(earthSpin);

  const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    color: 0x335577, shininess: 12, specular: new THREE.Color(0x223344)
  });
  const earth = new THREE.Mesh(earthGeo, earthMat);
  earthSpin.add(earth);

  // 赤道・地軸ガイド
  const equatorRing = new THREE.Mesh(
    new THREE.TorusGeometry(EARTH_RADIUS*1.01, 0.006, 8, 80),
    new THREE.MeshBasicMaterial({ color: 0xdd4444, transparent: true, opacity: 0.5 })
  );
  equatorRing.rotation.x = Math.PI / 2;
  equatorRing.visible = false;
  earthSpin.add(equatorRing);

  const axisLine = new THREE.Mesh(
    new THREE.CylinderGeometry(0.006, 0.006, EARTH_RADIUS*2.3, 8),
    new THREE.MeshBasicMaterial({ color: 0xffdd33 })
  );
  axisLine.visible = false;
  earthTilt.add(axisLine); // 傾きと一緒に動く（自転では回らない）

  // ===== テクスチャ読み込み =====
  let toLoad = 2;
  const loader = new THREE.TextureLoader();
  loader.setCrossOrigin('anonymous');
  function done() { if (--toLoad <= 0) loading.classList.add('hide'); }
  loader.load(EARTH_TEXTURE_URL, (tex) => {
    tex.anisotropy = 4; earthMat.map = tex; earthMat.color.set(0xffffff); earthMat.needsUpdate = true; done();
  }, undefined, () => { loading.textContent = '地球画像の読み込みに失敗しました'; });
  loader.load(SUN_TEXTURE_URL, (tex) => {
    sunMat.map = tex; sunMat.color.set(0xffffff); sunMat.needsUpdate = true; done();
  }, undefined, () => { done(); }); // 太陽は失敗しても色玉で続行

  // ===== レンダラー =====
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  wrap.appendChild(renderer.domElement);

  // 小窓（地球アップ）用レンダラー
  const insetRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  insetRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  insetEl.appendChild(insetRenderer.domElement);

  // ===== カメラ =====
  // メインカメラ（俯瞰／地球メイン共用）。cameraRig で向きをドラッグ。
  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 2000);
  const cameraRig = new THREE.Group();
  scene.add(cameraRig);
  cameraRig.add(camera);

  // 地球アップ専用カメラ
  const earthCam = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
  const earthCamRig = new THREE.Group();
  scene.add(earthCamRig);
  earthCamRig.add(earthCam);

  // ===== ビュー状態 =====
  // 0: 地球メイン, 1: 公転メイン, 2: 両方（公転メイン＋地球小窓）
  const VIEW_LABELS = ['地球メイン', '公転メイン', '両方'];
  let viewMode = 0;

  // ===== 公転・季節 =====
  // 季節は「公転角」で決まる。
  // 地軸は常にワールド +X 方向へ AXIS_TILT 倒れている。
  //   太陽が地球から見て +X 側（angle=0, 地球が -X 側）にあるとき＝北極が太陽を向く＝夏。
  // angle = earthOrbit.rotation.y（地球の公転角。0 のとき地球は (+R,0,0)）
  //   地球が (+R,0,0) のとき太陽は -X 方向 → 北極(+X傾き)は太陽と反対 → 冬。
  //   地球が (-R,0,0)(angle=π) のとき → 北極が太陽を向く → 夏。
  // よって季節の境目：
  //   angle=π     → 夏
  //   angle=0/2π  → 冬
  //   angle=π/2   → 春 or 秋、angle=3π/2 → 逆
  // 画像の並び（春=上,夏=左,秋=下,冬=右）に合わせ、反時計回り公転で
  // 冬→春→夏→秋 と進む向きに割り当てる。
  // 季節の境目角度（中心）。地球が +X 側(angle=0)のとき北極は太陽と反対 → 冬。
  const SEASON_POINTS = [
    { name: '冬', deg: 0 },
    { name: '春', deg: 90 },
    { name: '夏', deg: 180 },
    { name: '秋', deg: 270 }
  ];
  function seasonFromAngle(angle) {
    let a = ((angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const deg = a * 180 / Math.PI;
    if (deg < 45 || deg >= 315) return '冬';
    if (deg < 135) return '春';
    if (deg < 225) return '夏';
    return '秋';
  }

  const seasonLabelEl = document.getElementById('seasonLabel');
  const slider = document.getElementById('orbitSlider');
  const SLIDER_MAX = 1000;

  let orbitAngle = 0;           // ラジアン
  let revolve = true;           // 自動公転
  const REVOLVE_SPEED = 0.0016; // 自動公転速度

  function setOrbitAngle(angle) {
    orbitAngle = ((angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    earthOrbit.rotation.y = orbitAngle;
    // 地軸は宇宙空間で常に一定方向へ傾く（北極の向きは公転しても変わらない）。
    // earthOrbit のY回転を earthTilt 側で打ち消してから、一定方向へ傾ける。
    earthTilt.rotation.set(0, 0, 0);
    earthTilt.rotateY(-orbitAngle);   // earthOrbitのY回転を相殺（ワールド基準に戻す）
    earthTilt.rotateZ(AXIS_TILT);     // 一定方向へ23.4°傾ける
    if (seasonLabelEl) seasonLabelEl.textContent = seasonFromAngle(orbitAngle);
  }

  function syncSliderFromAngle() {
    const v = Math.round(orbitAngle / (Math.PI*2) * SLIDER_MAX) % (SLIDER_MAX+1);
    slider.value = v;
  }

  // スライダー操作 → 公転角へ
  let sliderDragging = false;
  slider.addEventListener('pointerdown', () => { sliderDragging = true; });
  slider.addEventListener('pointerup',   () => { sliderDragging = false; });
  slider.addEventListener('input', () => {
    sliderDragging = true;
    const frac = parseInt(slider.value, 10) / SLIDER_MAX;
    setOrbitAngle(frac * Math.PI * 2);
  });
  slider.addEventListener('change', () => { sliderDragging = false; });

  setOrbitAngle(0);
  syncSliderFromAngle();

  // ===== 操作（ドラッグ・ズーム）=====
  // 地球メイン: 地球を見る視点。公転メイン: 系全体を見る視点。
  let dragging = false, lastX = 0, lastY = 0, pinchDist = 0;
  // 各ビューで別々の視点角・距離を保持
  const camState = {
    earth: { rotX: 0.2, rotY: 0, dist: 3.4 },        // 地球メイン
    orbit: { rotX: 1.35, rotY: 0, dist: ORBIT_RADIUS*2.4 } // 公転メイン（真上=北から俯瞰）
  };
  function curState() { return viewMode === 0 ? camState.earth : camState.orbit; }

  const el = renderer.domElement;
  function pointerDown(x, y) { dragging = true; lastX = x; lastY = y; }
  function pointerMove(x, y) {
    if (!dragging) return;
    const s = curState();
    const dx = x - lastX, dy = y - lastY;
    s.rotY -= dx * 0.006;
    s.rotX -= dy * 0.006;
    s.rotX = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, s.rotX));
    lastX = x; lastY = y;
  }
  function pointerUp() { dragging = false; }

  el.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', pointerUp);
  el.addEventListener('wheel', e => {
    e.preventDefault();
    const s = curState();
    if (viewMode === 0) s.dist = Math.max(2.0, Math.min(8, s.dist + e.deltaY * 0.002));
    else s.dist = Math.max(ORBIT_RADIUS*1.3, Math.min(ORBIT_RADIUS*4, s.dist + e.deltaY * 0.01));
  }, { passive: false });

  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) pointerDown(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.hypot(dx, dy);
    }
  }, { passive: false });
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) pointerMove(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      const s = curState();
      if (pinchDist) {
        if (viewMode === 0) s.dist = Math.max(2.0, Math.min(8, s.dist - (d - pinchDist) * 0.01));
        else s.dist = Math.max(ORBIT_RADIUS*1.3, Math.min(ORBIT_RADIUS*4, s.dist - (d - pinchDist) * 0.04));
      }
      pinchDist = d;
    }
  }, { passive: false });
  el.addEventListener('touchend', e => { if (e.touches.length === 0) pointerUp(); pinchDist = 0; });

  // ===== ボタン =====
  const viewBtn = document.getElementById('viewBtn');
  const rotateBtn = document.getElementById('rotateBtn');
  const revolveBtn = document.getElementById('revolveBtn');
  const resetBtn = document.getElementById('resetBtn');
  const axisBtn = document.getElementById('axisBtn');
  const equatorBtn = document.getElementById('equatorBtn');
  const orbitLineBtn = document.getElementById('orbitLineBtn');
  const hint = document.getElementById('hint');

  let autoSpin = true;

  function applyView() {
    viewBtn.textContent = VIEW_LABELS[viewMode];
    insetEl.style.display = (viewMode === 2) ? 'block' : 'none';
    if (viewMode === 2) resizeInset();
  }

  viewBtn.addEventListener('click', () => {
    viewMode = (viewMode + 1) % 3;
    applyView();
  });
  rotateBtn.addEventListener('click', () => {
    autoSpin = !autoSpin; rotateBtn.classList.toggle('on', autoSpin);
  });
  revolveBtn.addEventListener('click', () => {
    revolve = !revolve; revolveBtn.classList.toggle('on', revolve);
  });
  resetBtn.addEventListener('click', () => {
    if (viewMode === 0) { camState.earth.rotX = 0.2; camState.earth.rotY = 0; camState.earth.dist = 3.4; }
    else { camState.orbit.rotX = 1.35; camState.orbit.rotY = 0; camState.orbit.dist = ORBIT_RADIUS*2.4; }
  });
  axisBtn.addEventListener('click', () => {
    axisLine.visible = !axisLine.visible;
    axisBtn.classList.toggle('on', axisLine.visible);
  });
  equatorBtn.addEventListener('click', () => {
    equatorRing.visible = !equatorRing.visible;
    equatorBtn.classList.toggle('on', equatorRing.visible);
  });
  orbitLineBtn.addEventListener('click', () => {
    orbitRing.visible = !orbitRing.visible;
    orbitLineBtn.classList.toggle('on', orbitRing.visible);
  });

  setTimeout(() => { hint.style.opacity = '0'; }, 5000);
  applyView();

  // ===== カメラ更新 =====
  const earthWorld = new THREE.Vector3();
  function updateMainCamera() {
    const s = curState();
    if (viewMode === 0) {
      // 地球メイン：地球を中心に見る
      earthPos.getWorldPosition(earthWorld);
      cameraRig.position.copy(earthWorld);
      cameraRig.rotation.set(0, 0, 0);
      camera.position.set(0, 0, s.dist);
      cameraRig.rotation.y = s.rotY;
      cameraRig.rotation.x = s.rotX;
      camera.lookAt(earthWorld);
    } else {
      // 公転メイン：太陽（原点）を中心に系全体を見る
      cameraRig.position.set(0, 0, 0);
      cameraRig.rotation.set(0, 0, 0);
      camera.position.set(0, 0, s.dist);
      cameraRig.rotation.y = s.rotY;
      cameraRig.rotation.x = s.rotX;
      camera.lookAt(0, 0, 0);
    }
  }

  // 地球小窓カメラ（常に地球アップ）
  function updateEarthCam() {
    earthPos.getWorldPosition(earthWorld);
    earthCamRig.position.copy(earthWorld);
    earthCamRig.rotation.set(0, 0, 0);
    earthCam.position.set(0, 0, 3.2);
    earthCamRig.rotation.x = 0.2;
    earthCam.lookAt(earthWorld);
  }

  // ===== ループ =====
  const SPIN_SPEED = 0.01;
  function animate() {
    requestAnimationFrame(animate);

    // 自動公転（スライダー操作中とドラッグ中は止める）
    if (revolve && !sliderDragging && !dragging) {
      setOrbitAngle(orbitAngle + REVOLVE_SPEED);
      syncSliderFromAngle();
    }

    // 自転
    if (autoSpin) earthSpin.rotation.y += SPIN_SPEED;

    // 太陽光を地球の方へ向ける（PointLightなので位置のみ。原点で常に全方向）
    updateMainCamera();
    renderer.render(scene, camera);

    if (viewMode === 2) {
      updateEarthCam();
      insetRenderer.render(scene, earthCam);
    }
  }
  animate();

  // ===== リサイズ =====
  function resizeInset() {
    const r = insetEl.getBoundingClientRect();
    insetRenderer.setSize(r.width, r.height, false);
    earthCam.aspect = 1;
    earthCam.updateProjectionMatrix();
  }
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    if (viewMode === 2) resizeInset();
  });
})();
</script>
</body>
</html>
